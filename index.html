<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lipsa Nayak — Business Analyst</title>
    <meta
      name="description"
      content="Lipsa Nayak — Business Analyst. End-to-end, consulting-grade case studies across fintech, banking, insurance and media."
    />
    <script>
      // Apply saved theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
